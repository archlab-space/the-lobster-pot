# ============================================
# Aggregated Entities (for efficient queries)
# ============================================

# Enums
enum PlayerStatus {
  SAFE
  WARNING
  CRITICAL
  INSOLVENT
  DELINQUENT
  DEAD
}

enum DeathCause {
  PURGED
  DELINQUENT
}

enum EventType {
  PLAYER_ENTERED
  PLAYER_DEPOSITED
  PLAYER_WITHDREW
  PLAYER_PURGED
  DELINQUENT_SETTLED
  TAX_SETTLED
  TAX_RATE_CHANGED
  REWARD_CLAIMED
  REWARD_DISTRIBUTED
  VOTER_REWARD_DISTRIBUTED
  TREASURY_DISTRIBUTION
  CAMPAIGN_STARTED
  CAMPAIGN_FUNDED
  BRIBE_UPDATED
  VOTE_CAST
  GAME_INITIALIZED
}

# GlobalState: Singleton entity tracking real-time global game state
type GlobalState {
  id: ID! # Always "GLOBAL"
  treasury: BigInt!
  taxRate: BigInt!
  previousTaxRate: BigInt!
  taxRateChangeBlock: BigInt!
  activePlayers: Int!
  totalEntries: Int!
  currentBlock: BigInt!
  currentKing: String!
  currentTerm: BigInt!
  termStartBlock: BigInt!
  termEndBlock: BigInt!
  totalYieldEmitted: BigInt!
  lastYieldUpdateBlock: BigInt!
  gameStartBlock: BigInt!
  electionContract: String!
  lastUpdatedAt: BigInt!
  lastUpdatedBlock: BigInt!
}

# Player: Aggregated player state with computed status fields
type Player {
  id: ID! # ${chainId}_${address}
  address: String!
  krillBalance: BigInt!
  lastTaxBlock: BigInt!
  joinedBlock: BigInt!
  entryCount: Int!
  isActive: Boolean!

  # Computed fields
  effectiveBalance: BigInt!
  status: PlayerStatus!
  isDelinquent: Boolean!
  isInsolvent: Boolean!

  # Stats
  killCount: Int!
  totalBountyEarned: BigInt!
  firstEntryBlock: BigInt!
  lastActivityBlock: BigInt!
  totalDeposited: BigInt!
  totalWithdrawn: BigInt!

  # Timestamps
  createdAt: BigInt!
  updatedAt: BigInt!

  # Relationships (derived)
  kills: [Death!]! @derivedFrom(field: "killer")
  deaths: [Death!]! @derivedFrom(field: "victim")
  votes: [Vote!]! @derivedFrom(field: "voter")
  campaigns: [Campaign!]! @derivedFrom(field: "candidate")
}

# Term: Election term tracking with boundaries and results
type Term {
  id: ID! # ${chainId}_${termNumber}
  termNumber: BigInt!
  startBlock: BigInt!
  endBlock: BigInt!
  king: String # Winner address (null until term ends)
  kingVoteCount: Int!
  totalCandidates: Int!
  totalVotes: Int!
  totalBribes: BigInt!

  # Relationships (derived)
  candidates: [Campaign!]! @derivedFrom(field: "term")
  votes: [Vote!]! @derivedFrom(field: "term")
}

# Campaign: Per-candidate campaign state for a specific term
type Campaign {
  id: ID! # ${chainId}_${termNumber}_${candidateAddress}
  term: Term!
  candidate: Player!
  bribePerVote: BigInt!
  campaignFunds: BigInt!
  voteCount: Int!
  totalBribesPaid: BigInt!
  isLeading: Boolean!
  isWinner: Boolean!
  createdAt: BigInt!
  updatedAt: BigInt!
}

# Vote: Individual vote record (one per voter per term)
type Vote {
  id: ID! # ${chainId}_${termNumber}_${voterAddress}
  term: Term!
  voter: Player!
  campaign: Campaign!
  bribeReceived: BigInt!
  votedAt: BigInt!
  votedAtTimestamp: BigInt!
  transactionHash: String!
}

# Death: Player elimination record for kill feed
type Death {
  id: ID! # ${chainId}_${block}_${logIndex}
  victim: Player!
  killer: Player!
  cause: DeathCause!
  krillAtDeath: BigInt!
  bountyEarned: BigInt!
  block: BigInt!
  timestamp: BigInt!
  transactionHash: String!
}

# ActivityEvent: Unified event feed for news ticker
type ActivityEvent {
  id: ID! # ${chainId}_${block}_${logIndex}
  eventType: EventType!
  block: BigInt!
  timestamp: BigInt!
  transactionHash: String!
  data: String! # JSON-encoded event-specific data

  # Indexed fields for filtering
  primaryAddress: String
  secondaryAddress: String
  amount: BigInt
}


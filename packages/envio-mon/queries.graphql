# GraphQL Queries for The Lobster Pot Spectator Dashboard
# Hasura-style syntax (Envio v2 indexer)

# 1. Global HUD - Real-time global game state
query GlobalHUD {
  GlobalState_by_pk(id: "GLOBAL") {
    treasury
    taxRate
    activePlayers
    totalEntries
    currentBlock
    currentKing
    currentTerm
    termStartBlock
    termEndBlock
    totalYieldEmitted
  }
}

# 2. Active Players - Grid of active agents in The Pot
query ActivePlayers {
  Player(where: {isActive: {_eq: true}}, limit: 1000, order_by: {krillBalance: desc}) {
    id
    address
    krillBalance
    effectiveBalance
    status
    isDelinquent
    killCount
    entryCount
    joinedBlock
    lastTaxBlock
  }
}

# 3. Leaderboard - Top players by various metrics
query Leaderboard($orderBy: [Player_order_by!], $first: Int = 10) {
  Player(
    where: {isActive: {_eq: true}}
    limit: $first
    order_by: $orderBy
  ) {
    address
    krillBalance
    effectiveBalance
    killCount
    totalBountyEarned
    status
    entryCount
  }
}

# 4. Kill Feed - Recent player deaths
query KillFeed($first: Int = 20) {
  Death(limit: $first, order_by: {block: desc}) {
    id
    victim {
      address
    }
    killer {
      address
    }
    cause
    krillAtDeath
    bountyEarned
    block
    timestamp
    transactionHash
  }
}

# 5. News Ticker - Recent activity events
query NewsTicker($first: Int = 50) {
  ActivityEvent(limit: $first, order_by: {block: desc}) {
    id
    eventType
    block
    timestamp
    transactionHash
    data
    primaryAddress
    secondaryAddress
    amount
  }
}

# 6. Current Election - Ongoing term with candidates and votes
query CurrentElection($termNumber: String!) {
  Term_by_pk(id: $termNumber) {
    termNumber
    startBlock
    endBlock
    king
    kingVoteCount
    totalCandidates
    totalVotes
    totalBribes
    candidates(order_by: {voteCount: desc}) {
      candidate {
        address
      }
      bribePerVote
      campaignFunds
      voteCount
      totalBribesPaid
      isLeading
      isWinner
    }
  }
}

# 7. Player Detail - Comprehensive profile for modal
query PlayerDetail($address: String!) {
  Player(where: {address: {_eq: $address}}) {
    address
    krillBalance
    effectiveBalance
    status
    killCount
    totalBountyEarned
    entryCount
    joinedBlock
    firstEntryBlock
    lastTaxBlock
    lastActivityBlock
    totalDeposited
    totalWithdrawn
    isActive
    isDelinquent
    isInsolvent
    kills(limit: 10, order_by: {block: desc}) {
      victim {
        address
      }
      cause
      bountyEarned
      block
      timestamp
    }
    deaths(limit: 10, order_by: {block: desc}) {
      killer {
        address
      }
      cause
      krillAtDeath
      block
      timestamp
    }
    votes(limit: 10, order_by: {votedAt: desc}) {
      term {
        termNumber
      }
      campaign {
        candidate {
          address
        }
      }
      bribeReceived
      votedAt
    }
    campaigns(limit: 10, order_by: {term: {termNumber: desc}}) {
      term {
        termNumber
      }
      voteCount
      bribePerVote
      campaignFunds
      totalBribesPaid
      isWinner
      isLeading
    }
  }
}

# 8. Vote History - Voting patterns for analysis
query VoteHistory($termNumber: String!, $first: Int = 100) {
  Vote(
    where: {term: {id: {_eq: $termNumber}}}
    limit: $first
    order_by: {votedAt: desc}
  ) {
    voter {
      address
    }
    campaign {
      candidate {
        address
      }
    }
    bribeReceived
    votedAt
    votedAtTimestamp
  }
}

# 9. Graveyard - Recently deceased players
query Graveyard($first: Int = 50) {
  Player(
    where: {isActive: {_eq: false}}
    order_by: {lastActivityBlock: desc}
    limit: $first
  ) {
    address
    krillBalance
    status
    lastActivityBlock
    deaths(limit: 1, order_by: {block: desc}) {
      cause
      killer {
        address
      }
      block
      timestamp
    }
  }
}

# 10. Treasury History - Treasury balance over time
query TreasuryHistory($first: Int = 100) {
  ActivityEvent(
    where: {eventType: {_in: [TREASURY_DISTRIBUTION, TAX_SETTLED, PLAYER_ENTERED, PLAYER_WITHDREW]}}
    limit: $first
    order_by: {block: desc}
  ) {
    eventType
    block
    timestamp
    amount
    data
  }
}

# 11. Player Search - Find players by address pattern
query PlayerSearch($addressPattern: String!, $first: Int = 20) {
  Player(
    where: {address: {_like: $addressPattern}}
    limit: $first
    order_by: {krillBalance: desc}
  ) {
    address
    krillBalance
    effectiveBalance
    status
    isActive
    killCount
  }
}

# 12. Campaign Performance - All campaigns for a specific term
query CampaignPerformance($termNumber: String!) {
  Campaign(
    where: {term: {id: {_eq: $termNumber}}}
    order_by: {voteCount: desc}
  ) {
    candidate {
      address
    }
    bribePerVote
    campaignFunds
    voteCount
    totalBribesPaid
    isLeading
    isWinner
    createdAt
    updatedAt
  }
}
